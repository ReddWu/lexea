<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <style>
    body{font:13px/1.5 -apple-system,system-ui,sans-serif;width:340px;margin:0;padding:14px;color:#111827;}
    .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
    .count{font-size:13px;color:#6b7280;}
    .bar{display:flex;gap:6px;margin-bottom:10px;}
    .bar button{flex:1;background:#2563eb;color:#fff;border:none;border-radius:7px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;}
    .bar button.alt{background:#374151;}
    .bar button:hover{filter:brightness(1.08);}
    .review{display:block;width:100%;background:#16a34a;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;}
    .review:hover{filter:brightness(1.06);}
    .copy{display:block;width:100%;background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:6px;}
    .copy:hover{filter:brightness(1.06);}
    #copyStatus{font-size:11px;color:#16a34a;text-align:center;min-height:14px;margin-bottom:6px;}
    ul{list-style:none;margin:0;padding:0;max-height:300px;overflow:auto;}
    li{position:relative;padding:7px 22px 7px 0;border-top:1px solid #f0f0f0;}
    .w{font-weight:700;}
    .c{color:#6b7280;font-size:12px;margin-top:2px;}
    .del{position:absolute;top:6px;right:0;border:none;background:none;color:#cbd5e1;font-size:14px;cursor:pointer;line-height:1;padding:2px 4px;}
    .del:hover{color:#dc2626;}
    .empty{color:#9ca3af;text-align:center;padding:24px 0;}
    a{color:#2563eb;cursor:pointer;}
  </style>
</head>
<body>
  <div class="top">
    <strong>单词本</strong>
    <span>
      <span class="count" id="count"></span>
      <a id="settings" style="cursor:pointer;color:#2563eb;margin-left:8px;">⚙ 设置</a>
    </span>
  </div>
  <button class="review" id="review">▶ 开始复习 <span id="due"></span></button>
  <button class="copy" id="copy">⧉ 复制弱词(粘进 ChatGPT 自定义指令)</button>
  <div id="copyStatus"></div>
  <div class="bar">
    <button id="csv">导出 CSV</button>
    <button id="json" class="alt">导出 JSON</button>
  </div>
  <ul id="list"></ul>
  <div class="empty" id="empty" style="display:none;">
    还没有单词。<br />在网页上选中一个单词即可保存,无需任何登录。<br />
    想跨设备 / 接 AI? 到 <a id="opt">设置</a> 里开启云同步(可选)。
  </div>
  <script src="popup.js"></script>
</body>
</html>
